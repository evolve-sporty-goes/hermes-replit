<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <title>OpenRouter Token Harvester</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; color: #fff; font: 14px monospace; padding: 20px; }
        #log { white-space: pre-wrap; max-height: 80vh; overflow-y: auto; }
        .token { background: #1a3a1a; padding: 8px; margin: 4px 0; border-radius: 4px; word-break: break-all; }
        button { background: #333; color: #fff; border: 1px solid #555; padding: 8px 16px; cursor: pointer; margin: 8px; }
        button:hover { background: #444; }
        #status { margin: 10px 0; padding: 10px; background: #222; border-radius: 4px; }
    </style>
</head>
<body>
    <h2>OpenRouter Turnstile Token Harvester</h2>
    <div id="status">Initializing...</div>
    <button id="harvest">Harvest Token</button>
    <button id="copy">Copy Token</button>
    <div id="log"></div>

    <script>
        const SITEKEY = '0x4AAAAAAAWXJGBD7bONzLBd';
        const TOKEN_SERVER = 'ws://localhost:8080';
        let currentToken = null;
        let log = [];

        function addLog(msg) {
            log.push(msg);
            document.getElementById('log').innerHTML = log.map(l => 
                l.startsWith('TOKEN:') ? `<div class="token">${l}</div>` : l
            ).join('<br>');
        }

        async function harvestToken() {
            addLog('Starting token harvest...');
            document.getElementById('status').textContent = 'Harvesting...';

            // Connect to token server as receiver
            const ws = new WebSocket(TOKEN_SERVER);
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                addLog('Connected to token server, registering as receiver...');
                ws.send(new Uint8Array([1])); // Register as receiver
            };

            ws.onmessage = (e) => {
                const data = new Uint8Array(e.data);
                if (data.length > 0 && data[0] === 0) {
                    // Token received (after header byte 0)
                    const tokenBytes = data.slice(1);
                    // Skip solver_idx (4 bytes) then the rest is the token
                    const token = new TextDecoder().decode(tokenBytes.slice(4));
                    currentToken = token;
                    addLog('TOKEN:' + token);
                    document.getElementById('status').textContent = 'Token harvested!';
                }
            };

            ws.onerror = (e) => {
                addLog('WebSocket error: ' + e.type);
            };

            // Create iframe with Turnstile widget
            const iframe = document.createElement('iframe');
            iframe.style.width = '300px';
            iframe.style.height = '400px';
            iframe.style.border = '1px solid #333';
            iframe.style.margin = '10px';
            
            // Load Turnstile widget page
            iframe.src = `https://challenges.cloudflare.com/turnstile/v0/turnstile.html?sitekey=${SITEKEY}&size=compact`;
            document.body.appendChild(iframe);

            addLog('Turnstile iframe loaded, waiting for token...');
        }

        function copyToken() {
            if (currentToken) {
                navigator.clipboard.writeText(currentToken);
                addLog('Token copied to clipboard!');
            } else {
                addLog('No token to copy yet');
            }
        }

        document.getElementById('harvest').onclick = harvestToken;
        document.getElementById('copy').onclick = copyToken;
    </script>
</body>
</html>
